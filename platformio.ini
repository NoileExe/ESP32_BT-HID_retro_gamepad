; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[common]
; Arduino Release v3.3.8 based on ESP-IDF v5.5.4 Latest - 2026 Apr 13
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
framework = arduino
lib_deps = 
    https://github.com/Mystfit/ESP32-BLE-CompositeHID.git#v0.4.0
    ; thomasfredericks/Bounce2 @ 2.72
    ; GyverLibs:
    gyverlibs/GTimer @ 1.1.2
    gyverlibs/GyverBlinker @ 1.1.1
    ; MAX17043/48 Fuel Gage
    sparkfun/SparkFun MAX1704x Fuel Gauge Arduino Library @ 1.0.4
build_type = release
build_flags =
    ; -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_ERROR
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE
    -std=gnu++17
    -Os
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time


[env:esp32-c3]
extends = common
board = esp32-c3-devkitc-02
build_flags = 
    ${common.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Отладка для ESP32-C3
; upload_protocol = esp-builtin
; debug_tool = esp-builtin
; debug_init_break = tbreak setup